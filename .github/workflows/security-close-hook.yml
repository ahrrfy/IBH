name: Security Close Hook (governance sync on alert close)

# Closes the security self-healing loop by polling for DISMISSED or FIXED
# alerts and closing their corresponding `security:auto` issues + patching
# governance/OPEN_ISSUES.md.
#
# NOTE: code_scanning_alert / secret_scanning_alert webhook events require
# GitHub Advanced Security. We poll the REST API instead — same result,
# works on any repository plan.
#
# Trigger matrix:
#   schedule        → daily at 07:00 UTC (sweep for recently resolved alerts)
#   workflow_dispatch → manual testing

on:
  # Daily sweep at 07:00 UTC
  schedule:
    - cron: '0 7 * * *'

  # Manual trigger (also useful for testing individual closes)
  workflow_dispatch:
    inputs:
      alert_type:
        description: 'code-scanning | secret-scanning | dependabot'
        required: true
      alert_number:
        description: 'Numeric alert ID'
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Manual dispatch: close a specific alert ─────────────────────────
      - name: Close specific alert (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          ALERT_TYPE: ${{ github.event.inputs.alert_type }}
          ALERT_NUMBER: ${{ github.event.inputs.alert_number }}
          SHA: ${{ github.sha }}
        run: |
          KEY="SEC-${ALERT_TYPE}-${ALERT_NUMBER}"
          bash scripts/close-security-issue.sh "$KEY" "$SHA"

      # ── Scheduled sweep: close issues for dismissed/fixed code-scanning ──
      - name: Close dismissed code-scanning issues
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          gh api "repos/${{ github.repository }}/code-scanning/alerts?state=dismissed&per_page=20" \
            > /tmp/dismissed-cs.json 2>/dev/null || echo "[]" > /tmp/dismissed-cs.json

          COUNT=$(jq 'length' /tmp/dismissed-cs.json)
          echo "→ Found $COUNT dismissed code-scanning alerts"

          jq -c '.[]' /tmp/dismissed-cs.json | while read -r alert; do
            NUM=$(echo "$alert" | jq -r .number)
            KEY="SEC-code-scanning-${NUM}"
            bash scripts/close-security-issue.sh "$KEY" "$SHA" || echo "  (skip $KEY)"
          done

      # ── Scheduled sweep: close issues for resolved secret-scanning ───────
      - name: Close resolved secret-scanning issues
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          gh api "repos/${{ github.repository }}/secret-scanning/alerts?state=resolved&per_page=20" \
            > /tmp/resolved-ss.json 2>/dev/null || echo "[]" > /tmp/resolved-ss.json

          COUNT=$(jq 'length' /tmp/resolved-ss.json)
          echo "→ Found $COUNT resolved secret-scanning alerts"

          jq -c '.[]' /tmp/resolved-ss.json | while read -r alert; do
            NUM=$(echo "$alert" | jq -r .number)
            KEY="SEC-secret-scanning-${NUM}"
            bash scripts/close-security-issue.sh "$KEY" "$SHA" || echo "  (skip $KEY)"
          done

      # ── Scheduled sweep: close issues for dismissed/fixed dependabot ─────
      - name: Close dismissed Dependabot issues
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          gh api "repos/${{ github.repository }}/dependabot/alerts?state=dismissed&per_page=20" \
            > /tmp/dismissed-dep.json 2>/dev/null || echo "[]" > /tmp/dismissed-dep.json

          COUNT=$(jq 'length' /tmp/dismissed-dep.json)
          echo "→ Found $COUNT dismissed Dependabot alerts"

          jq -c '.[]' /tmp/dismissed-dep.json | while read -r alert; do
            NUM=$(echo "$alert" | jq -r .number)
            KEY="SEC-dependabot-${NUM}"
            bash scripts/close-security-issue.sh "$KEY" "$SHA" || echo "  (skip $KEY)"
          done
