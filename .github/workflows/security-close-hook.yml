name: Security Close Hook (governance sync on alert close)

# Closes the security self-healing loop. When a code scanning or secret
# alert is resolved (fixed, dismissed, or revoked), this workflow:
#   1. Finds the matching `security:auto` issue → closes it with the SHA
#   2. Opens a small auto-PR that flips the row in governance/OPEN_ISSUES.md
#      from 🔴 to ✅ + appends close timestamp
#
# Pairs with security-bridge.yml. Together they form: open-on-detect /
# close-on-fix, mirroring how auto-diagnose.yml + manual close work for CI.

on:
  code_scanning_alert:
    types: [closed_by_user, fixed]
  secret_scanning_alert:
    types: [resolved, revoked]
  workflow_dispatch:
    inputs:
      alert_type:
        description: code-scanning | secret-scanning | dependabot
        required: true
      alert_number:
        description: Numeric alert ID
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve alert id
        id: ids
        env:
          ALERT_JSON: ${{ toJson(github.event.alert) }}
        run: |
          if [ -n "${{ github.event.inputs.alert_type }}" ]; then
            echo "type=${{ github.event.inputs.alert_type }}" >> "$GITHUB_OUTPUT"
            echo "num=${{ github.event.inputs.alert_number }}" >> "$GITHUB_OUTPUT"
          else
            TYPE="code-scanning"
            [ "${{ github.event_name }}" = "secret_scanning_alert" ] && TYPE="secret-scanning"
            echo "type=$TYPE" >> "$GITHUB_OUTPUT"
            echo "num=$(echo "$ALERT_JSON" | jq -r .number)" >> "$GITHUB_OUTPUT"
          fi

      - name: Close matching issue
        env:
          GH_TOKEN: ${{ github.token }}
          KEY: SEC-${{ steps.ids.outputs.type }}-${{ steps.ids.outputs.num }}
          SHA: ${{ github.sha }}
        run: |
          NUM=$(gh issue list \
            --label security:auto \
            --state open \
            --search "$KEY in:title" \
            --json number -q '.[0].number' --limit 1 || true)

          if [ -z "$NUM" ]; then
            echo "→ No open issue matches $KEY — already closed or never opened"
            exit 0
          fi

          gh issue close "$NUM" \
            --reason completed \
            --comment "✅ Resolved at \`${SHA}\`. Auto-closed by security-close-hook.yml."

      - name: Update OPEN_ISSUES.md (flip row to ✅)
        env:
          GH_TOKEN: ${{ github.token }}
          KEY: SEC-${{ steps.ids.outputs.type }}-${{ steps.ids.outputs.num }}
          SHA: ${{ github.sha }}
        run: |
          # Only act if the file mentions this key
          if ! grep -q "$KEY" governance/OPEN_ISSUES.md; then
            echo "→ $KEY not present in OPEN_ISSUES.md — nothing to flip"
            exit 0
          fi

          BRANCH="bot/close-${KEY}"
          git config user.name  "al-ruya-security-bot"
          git config user.email "security-bot@ibherp.cloud"
          git checkout -b "$BRANCH"

          # Replace the first 🔴/🟠/🟡 marker on lines mentioning this key
          # with ✅ and append the close SHA. Keeps human-edited rows safe.
          sed -i -E "/${KEY}/ s/(🔴|🟠|🟡|مفتوح)/✅ مغلق ${SHA:0:7}/g" governance/OPEN_ISSUES.md

          if git diff --quiet; then
            echo "→ no actual line changed — exiting"
            exit 0
          fi

          git add governance/OPEN_ISSUES.md
          git commit -m "chore(security): close ${KEY} in OPEN_ISSUES [skip ci]" \
                     -m "Auto-closed by security-close-hook.yml after the underlying alert was resolved at ${SHA}."
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(security): close ${KEY} in OPEN_ISSUES" \
            --body "Auto-PR closing the governance entry for ${KEY}. Triggered by alert resolution at ${SHA}." \
            --label "security:auto,governance" || true

          PR=$(gh pr list --head "$BRANCH" --json number -q '.[0].number')
          [ -n "$PR" ] && gh pr merge "$PR" --squash --auto || true
