name: Mobile Release (EAS)

# Builds the Expo mobile app via EAS Build.
#
# Triggers:
#   - Tag push matching `mobile-v*` → production build (Android AAB + iOS IPA)
#   - Manual workflow_dispatch → choose profile (development | preview | production)
#     and platform (android | ios | all)
#
# Required GitHub Secrets:
#   EXPO_TOKEN — Expo account robot token with build/submit perms
#                (create at https://expo.dev/accounts/[account]/settings/access-tokens)
#
# Notes:
#   - Builds run on EAS cloud (not on the GH runner) — runner just kicks them off.
#   - First-time setup: `eas init` locally must have set the projectId in app.json
#     before this workflow can find the project.
#   - iOS production builds also need Apple credentials configured on Expo
#     (`eas credentials`) — this workflow does not handle the Apple side.

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        type: choice
        required: true
        default: 'preview'
        options:
          - development
          - preview
          - production
      platform:
        description: 'Target platform'
        type: choice
        required: true
        default: 'all'
        options:
          - android
          - ios
          - all

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve build inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "profile=production" >> "$GITHUB_OUTPUT"
            echo "platform=all"        >> "$GITHUB_OUTPUT"
          else
            echo "profile=${{ inputs.profile }}"  >> "$GITHUB_OUTPUT"
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
          fi

      - name: EAS Build
        run: |
          eas build \
            --profile "${{ steps.inputs.outputs.profile }}" \
            --platform "${{ steps.inputs.outputs.platform }}" \
            --non-interactive \
            --no-wait

      - name: Summary
        run: |
          echo "### Mobile Build Triggered" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Profile:  \`${{ steps.inputs.outputs.profile }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Platform: \`${{ steps.inputs.outputs.platform }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Track progress: https://expo.dev/accounts/[your-account]/projects/al-ruya-mobile/builds" >> "$GITHUB_STEP_SUMMARY"

  submit:
    name: Submit to Stores (production tags only)
    needs: build
    if: startsWith(github.ref, 'refs/tags/mobile-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      # Submits the latest finished production build to internal tracks.
      # Will fail loudly if the build hasn't finished yet — re-run the job
      # once `eas build:list` shows status=finished.
      - name: Submit Android
        run: eas submit --platform android --profile production --non-interactive --latest
      - name: Submit iOS
        run: eas submit --platform ios --profile production --non-interactive --latest
