name: CI

# Gate every push and PR before deploy-vps.yml gets a chance to run.
# All jobs run in parallel; deploy is gated separately.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# pnpm MUST be installed before actions/setup-node — setup-node's
# `cache: 'pnpm'` shells out to pnpm to find the store path. Reverse
# order = "Unable to locate executable file: pnpm" (this killed the
# previous ci.yml — see governance/OPEN_ISSUES §I014).

jobs:
  typecheck-build:
    name: Typecheck + Build (api + workspace packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version comes from package.json "packageManager" field — don't
      # specify it here or pnpm/action-setup errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
      - name: Build workspace packages first
        run: pnpm --filter '@erp/shared-types' --filter '@erp/validation-schemas' --filter '@erp/domain-events' build
      - name: Type-check API
        run: cd apps/api && pnpm exec tsc --noEmit
      - name: Build API
        run: pnpm --filter api build
      - name: Verify build output
        run: test -f apps/api/dist/main.js

  e2e-tests:
    name: E2E acceptance tests (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector/pgvector:pg16 — schema.prisma requires the vector extension.
        # Same image production uses, so CI matches prod environment.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: alruya_erp_test
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: testpass
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U erp -d alruya_erp_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://erp:testpass@localhost:5432/alruya_erp_test?schema=public
      REDIS_URL: redis://localhost:6379
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret-not-for-production
      NODE_ENV: test
      # Required by seed-bootstrap.ts — these are CI-only dummy credentials,
      # the seed creates the system owner user with these. Tests log in as
      # TEST_ADMIN_* (a separate seeded user).
      OWNER_USERNAME: ci-owner
      OWNER_PASSWORD: ci-owner-password-not-for-production
      # Seed reads ADMIN_EMAIL/PASSWORD; auth.e2e-spec reads TEST_ADMIN_*.
      # Same conceptual user — pin both pairs to identical values so the
      # test admin is created AND the test logs in as that user.
      ADMIN_EMAIL: testadmin@ci.test
      ADMIN_PASSWORD: ci-test-admin-password-not-for-production
      TEST_ADMIN_EMAIL: testadmin@ci.test
      TEST_ADMIN_PASSWORD: ci-test-admin-password-not-for-production
    steps:
      - uses: actions/checkout@v4
      # Version comes from package.json "packageManager" field — don't
      # specify it here or pnpm/action-setup errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Postgres extensions + ULID helper function
        # Schema.prisma uses gen_ulid() as default for IDs and current_company_id()
        # for RLS. These come from migration 0001 — but we use db push (not
        # migrate deploy) since migrations are partial. So pre-create the
        # functions here, then let db push handle tables + enums.
        env: { PGPASSWORD: testpass }
        run: |
          PSQL="psql -h localhost -U erp -d alruya_erp_test -v ON_ERROR_STOP=1"
          $PSQL -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          $PSQL -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          $PSQL -c "CREATE EXTENSION IF NOT EXISTS vector;"
          # gen_ulid() — copied from migration 0007 (the bigint-cast-fixed version)
          $PSQL <<'SQL'
          CREATE OR REPLACE FUNCTION gen_ulid() RETURNS TEXT AS $$
          DECLARE
            encoding   TEXT := '0123456789ABCDEFGHJKMNPQRSTVWXYZ';
            output     TEXT := '';
            now_ms     BIGINT;
            rand_bytes BYTEA;
            i          INT;
          BEGIN
            now_ms := EXTRACT(EPOCH FROM clock_timestamp()) * 1000;
            FOR i IN REVERSE 9..0 LOOP
              output := output || SUBSTR(encoding, ((now_ms >> (i * 5) & 31) + 1)::int, 1);
            END LOOP;
            rand_bytes := gen_random_bytes(10);
            FOR i IN 0..9 LOOP
              output := output || SUBSTR(encoding, ((GET_BYTE(rand_bytes, i) >> 3 & 31) + 1)::int, 1);
              IF i < 9 THEN
                output := output || SUBSTR(encoding, (((GET_BYTE(rand_bytes, i) & 7) << 2 | GET_BYTE(rand_bytes, i+1) >> 6) & 31 + 1)::int, 1);
              END IF;
            END LOOP;
            RETURN SUBSTR(output, 1, 26);
          END;
          $$ LANGUAGE plpgsql VOLATILE;

          CREATE OR REPLACE FUNCTION current_company_id() RETURNS TEXT AS $$
            SELECT NULLIF(current_setting('app.current_company', true), '');
          $$ LANGUAGE sql STABLE;
          SQL
      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate
      - name: Sync schema (creates tables + enums from schema.prisma)
        run: pnpm --filter api exec prisma db push --skip-generate --accept-data-loss
      - name: Apply SQL-only invariants (triggers + RLS + partial unique indexes)
        # Migrations contain ~75 constructs that schema.prisma can't express:
        # - append-only triggers on audit_logs, je_lines, stock_ledger
        # - tenant_isolation RLS policies on every multi-tenant table
        # - partial unique indexes (e.g. shifts_one_open_per_device WHERE
        #   status='open', pos_receipts_client_ulid_uk WHERE clientUlid IS NOT NULL)
        # db push doesn't replicate these. Apply each migration with ON_ERROR_STOP=0
        # so 'already exists' errors on tables/columns are tolerated; the new
        # invariants slip through.
        env: { PGPASSWORD: testpass }
        run: |
          for f in apps/api/prisma/migrations/*/migration.sql; do
            echo "→ $f"
            psql -h localhost -U erp -d alruya_erp_test -v ON_ERROR_STOP=0 -f "$f" >/dev/null 2>&1 || true
          done
          # Verify what the e2e tests actually depend on:
          # 1. partial unique index (shift-open-close)
          PSQL_Q="psql -h localhost -U erp -d alruya_erp_test -tAc"
          $PSQL_Q "SELECT 1 FROM pg_indexes WHERE indexname = 'shifts_one_open_per_device'" \
            | grep -q 1 || { echo "❌ shifts_one_open_per_device missing"; exit 1; }
          # 2. append-only triggers (inventory-mwa + audit-append-only)
          for trg in no_update_audit_logs no_update_stock_ledger no_update_je_lines; do
            $PSQL_Q "SELECT 1 FROM pg_trigger WHERE tgname = '$trg'" \
              | grep -q 1 || { echo "❌ trigger $trg missing"; exit 1; }
          done
          echo "✅ partial indexes + triggers + RLS applied"
      - name: Seed bootstrap data (companies, roles, admin user, Iraqi CoA)
        # Many tests reference companies/users from seed via prisma.company.findFirst().
        # Without this they fail with PrismaClientKnownRequestError on null records.
        run: pnpm --filter api exec prisma db seed
      - name: Build workspace packages
        run: pnpm --filter '@erp/shared-types' --filter '@erp/validation-schemas' --filter '@erp/domain-events' build
      - name: Run e2e suite
        run: pnpm --filter api test:e2e

  standalone-services:
    name: Standalone services (license-server + whatsapp-bridge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: license-server tests
        working-directory: apps/license-server
        run: |
          npm install --no-audit --no-fund
          npm test
      - name: whatsapp-bridge tests
        working-directory: apps/whatsapp-bridge
        run: |
          npm install --no-audit --no-fund
          npm test
