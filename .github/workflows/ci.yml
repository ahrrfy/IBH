name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build API + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: TypeScript type-check
        run: cd apps/api && pnpm exec tsc --noEmit

      - name: Build API
        run: pnpm --filter api build

      - name: Verify build output
        run: test -f apps/api/dist/main.js

  migration-check:
    name: Prisma migration + seed dry run
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: alruya_erp_test
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d alruya_erp_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - run: pnpm install --frozen-lockfile

      - name: Install pgcrypto + pg_trgm extensions (pgvector may be skipped)
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U erp -d alruya_erp_test -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h localhost -U erp -d alruya_erp_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://erp:testpass@localhost:5432/alruya_erp_test?schema=public
        run: pnpm --filter api exec prisma migrate deploy

      - name: Smoke-check Prisma client generates
        env:
          DATABASE_URL: postgresql://erp:testpass@localhost:5432/alruya_erp_test?schema=public
        run: pnpm --filter api exec prisma generate

  lint:
    name: Lint (soft — non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api lint || true
