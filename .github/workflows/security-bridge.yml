name: Security Bridge (alerts → governance)

# Self-healing security loop — polls GitHub Security APIs on each CodeQL
# completion and daily, then calls sync-security-issues.sh to open/update
# GitHub Issues and (for critical findings) patch governance/OPEN_ISSUES.md.
#
# NOTE: code_scanning_alert / secret_scanning_alert / dependabot_alert webhook
# events require GitHub Advanced Security on private repos. We use REST API
# polling instead, which works on any repository configuration.
#
# Trigger matrix:
#   workflow_run → fires after every CodeQL scan (primary, near-real-time)
#   workflow_dispatch → manual testing / ad-hoc re-sync
#
# No cron: CodeQL itself runs on every push to main, every PR, and weekly
# on schedule (see codeql.yml). Piggybacking on its completion catches
# every state change without redundant daily polling.

on:
  # Primary: piggyback on CodeQL completion
  workflow_run:
    workflows: ['CodeQL']
    types: [completed]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      alert_type:
        description: 'Specific type to re-sync: code-scanning | secret-scanning | dependabot (leave empty for all)'
        required: false
        default: ''

permissions:
  contents: write       # to push bot branch for governance updates
  issues: write         # to open/update issues
  pull-requests: write  # to open the OPEN_ISSUES.md PR
  security-events: read # to read code scanning alerts via API

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Poll CODE SCANNING alerts ───────────────────────────────────────
      - name: Poll code-scanning alerts
        if: >
          github.event_name == 'workflow_run' ||
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.alert_type == '' || github.event.inputs.alert_type == 'code-scanning'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/code-scanning/alerts?state=open&per_page=20" \
            > /tmp/code-scanning.json 2>/dev/null || echo "[]" > /tmp/code-scanning.json

          COUNT=$(jq 'length' /tmp/code-scanning.json)
          echo "→ Found $COUNT open code-scanning alerts"
          if [ "$COUNT" -eq 0 ]; then exit 0; fi

          jq -c '.[]' /tmp/code-scanning.json | while read -r alert; do
            export ALERT_TYPE=code-scanning
            export ALERT_NUMBER=$(echo "$alert"  | jq -r .number)
            export ALERT_URL=$(echo "$alert"     | jq -r .html_url)
            export ALERT_RULE=$(echo "$alert"    | jq -r '.rule.id // "unknown"')
            export ALERT_SEVERITY=$(echo "$alert"| jq -r '.rule.severity // "medium"')
            export ALERT_FILE=$(echo "$alert"    | jq -r '.most_recent_instance.location.path // ""')
            export ALERT_LINE=$(echo "$alert"    | jq -r '.most_recent_instance.location.start_line // ""')
            export ALERT_SUMMARY=$(echo "$alert" | jq -r '.rule.description // .rule.name // "no summary"' | tr '\n' ' ')
            export GH_TOKEN="${{ github.token }}"
            bash scripts/sync-security-issues.sh || echo "  (sync failed for code-scanning #$ALERT_NUMBER — continuing)"
          done

      # ── Poll SECRET SCANNING alerts ─────────────────────────────────────
      - name: Poll secret-scanning alerts
        if: >
          github.event_name == 'workflow_run' ||
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.alert_type == '' || github.event.inputs.alert_type == 'secret-scanning'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/secret-scanning/alerts?state=open&per_page=20" \
            > /tmp/secret-scanning.json 2>/dev/null || echo "[]" > /tmp/secret-scanning.json

          COUNT=$(jq 'length' /tmp/secret-scanning.json)
          echo "→ Found $COUNT open secret-scanning alerts"
          if [ "$COUNT" -eq 0 ]; then exit 0; fi

          jq -c '.[]' /tmp/secret-scanning.json | while read -r alert; do
            export ALERT_TYPE=secret-scanning
            export ALERT_NUMBER=$(echo "$alert"  | jq -r .number)
            export ALERT_URL=$(echo "$alert"     | jq -r .html_url)
            export ALERT_RULE=$(echo "$alert"    | jq -r '.secret_type // "unknown-secret"')
            export ALERT_SEVERITY=critical
            export ALERT_FILE=""
            export ALERT_LINE=""
            export ALERT_SUMMARY="Leaked secret of type $(echo "$alert" | jq -r '.secret_type // "unknown"') — rotate immediately"
            export GH_TOKEN="${{ github.token }}"
            bash scripts/sync-security-issues.sh || echo "  (sync failed for secret-scanning #$ALERT_NUMBER — continuing)"
          done

      # ── Poll DEPENDABOT alerts ──────────────────────────────────────────
      - name: Poll Dependabot alerts
        if: >
          github.event_name == 'workflow_run' ||
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.alert_type == '' || github.event.inputs.alert_type == 'dependabot'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/dependabot/alerts?state=open&per_page=20" \
            > /tmp/dependabot.json 2>/dev/null || echo "[]" > /tmp/dependabot.json

          COUNT=$(jq 'length' /tmp/dependabot.json)
          echo "→ Found $COUNT open Dependabot alerts"
          if [ "$COUNT" -eq 0 ]; then exit 0; fi

          jq -c '.[]' /tmp/dependabot.json | while read -r alert; do
            export ALERT_TYPE=dependabot
            export ALERT_NUMBER=$(echo "$alert"  | jq -r .number)
            export ALERT_URL=$(echo "$alert"     | jq -r .html_url)
            export ALERT_RULE=$(echo "$alert"    | jq -r '.security_advisory.cve_id // .security_advisory.ghsa_id // "unknown"')
            export ALERT_SEVERITY=$(echo "$alert"| jq -r '.security_advisory.severity // "medium"')
            export ALERT_FILE=$(echo "$alert"    | jq -r '.dependency.manifest_path // ""')
            export ALERT_LINE=""
            export ALERT_SUMMARY=$(echo "$alert" | jq -r '.security_advisory.summary // "no summary"' | tr '\n' ' ')
            export GH_TOKEN="${{ github.token }}"
            bash scripts/sync-security-issues.sh || echo "  (sync failed for dependabot #$ALERT_NUMBER — continuing)"
          done
