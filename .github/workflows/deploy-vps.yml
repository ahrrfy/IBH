name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ibherp.cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 -H "${{ secrets.VPS_HOST }}" > ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts || { echo "ssh-keyscan empty for '${{ secrets.VPS_HOST }}'"; exit 1; }
          echo "known_hosts populated ($(wc -l < ~/.ssh/known_hosts) entries)"

      - name: Verify SSH connectivity
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes root@${{ secrets.VPS_HOST }} \
            'echo connected as $(whoami)@$(hostname -f)'

      - name: Run deploy script on VPS
        run: |
          # Pipe the repo's deploy script straight into a remote bash. No
          # heredoc — heredoc bodies inside YAML can be ambiguous and we hit
          # exactly that earlier (variables expanded on runner, not on VPS).
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} \
            'bash -s' < infra/scripts/deploy-on-vps.sh

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_ed25519
