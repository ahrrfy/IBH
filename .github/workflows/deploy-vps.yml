name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ibherp.cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -x
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Sanity: header + length should match an ed25519 OpenSSH key
          head -1 ~/.ssh/id_ed25519
          wc -l < ~/.ssh/id_ed25519
          # Scan host keys (suppress stderr noise but capture exit code)
          ssh-keyscan -T 5 -t rsa,ecdsa,ed25519 -H "$VPS_HOST" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          wc -l < ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts

      - name: Verify SSH connectivity
        run: ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${{ secrets.VPS_HOST }}" 'whoami; hostname -f; uptime'

      - name: Run deploy script on VPS
        run: ssh -i ~/.ssh/id_ed25519 "root@${{ secrets.VPS_HOST }}" 'bash -s' < infra/scripts/deploy-on-vps.sh

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_ed25519
