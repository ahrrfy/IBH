name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ibherp.cloud
    runs-on: ubuntu-latest
    # Only run after CI passes (if you have a separate CI workflow)
    # needs: [ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 -H "${{ secrets.VPS_HOST }}" > ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts || { echo "❌ ssh-keyscan produced empty known_hosts for host '${{ secrets.VPS_HOST }}'"; exit 1; }
          echo "✅ known_hosts populated ($(wc -l < ~/.ssh/known_hosts) entries)"

      - name: Pull latest + restart stack on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} bash -s <<'EOF'
          set -euo pipefail
          cd /opt/al-ruya-erp
          git fetch origin main
          git reset --hard origin/main

          cd infra
          COMPOSE="docker compose -f docker-compose.bootstrap.yml --env-file .env"

          # Rebuild only api + web (postgres/redis/minio don't change)
          $COMPOSE build api web
          $COMPOSE up -d --force-recreate api web

          # Reload nginx so it picks up any conf changes AND re-resolves
          # the new container IPs via Docker's embedded DNS (resolver 127.0.0.11).
          # Closes I013 — no more manual `docker restart nginx` after deploy.
          if $COMPOSE exec -T nginx nginx -t 2>&1; then
            $COMPOSE exec -T nginx nginx -s reload
            echo "✅ nginx reloaded"
          else
            echo "❌ nginx config invalid — skipping reload"
            exit 1
          fi

          # Run any new migrations
          $COMPOSE exec -T api \
            sh -c 'cd /app && npx prisma migrate deploy --schema=prisma/schema.prisma' || true

          # Health probe with retries (api may need a few seconds to boot)
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 5 https://ibherp.cloud/health > /dev/null; then
              echo "✅ Deploy successful — /health OK on attempt $i"
              exit 0
            fi
            echo "⏳ /health not ready (attempt $i/6) — sleeping 5s"
            sleep 5
          done

          echo "❌ /health failed after 6 attempts — dumping logs"
          $COMPOSE logs api --tail=80
          $COMPOSE logs web --tail=40
          $COMPOSE logs nginx --tail=20
          exit 1
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_ed25519
