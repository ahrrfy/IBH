name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ibherp.cloud
    runs-on: ubuntu-latest
    # Hard cap so a hung build/migrate doesn't keep the runner for 6h.
    # The script itself bounds individual steps; this is the outer safety net.
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -x
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Sanity: header + length should match an ed25519 OpenSSH key
          head -1 ~/.ssh/id_ed25519
          wc -l < ~/.ssh/id_ed25519

          # I047 — ssh-keyscan with retries. The previous one-shot 5s scan
          # was failing intermittently from GitHub runners (likely transient
          # network paths between Azure and Hostinger Frankfurt). 4 attempts
          # × 15s timeout each gives plenty of headroom and dumps DNS/TCP
          # diagnostics on the way down.
          for attempt in 1 2 3 4; do
            echo "ssh-keyscan attempt ${attempt}..."
            if ssh-keyscan -T 15 -t rsa,ecdsa,ed25519 -H "$VPS_HOST" > ~/.ssh/known_hosts 2>/tmp/keyscan.err; then
              if [ -s ~/.ssh/known_hosts ]; then
                echo "✅ host keys received on attempt ${attempt}"
                break
              fi
            fi
            cat /tmp/keyscan.err || true
            if [ "${attempt}" = "4" ]; then
              echo "❌ ssh-keyscan failed 4× — diagnostic dump:"
              echo "  DNS:"; getent hosts "$VPS_HOST" || echo "    (resolution failed)"
              echo "  TCP :22:"; timeout 10 bash -c "echo > /dev/tcp/$VPS_HOST/22" && echo "    open" || echo "    closed/blocked"
              exit 1
            fi
            sleep 5
          done
          chmod 644 ~/.ssh/known_hosts
          wc -l < ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts

      - name: Verify SSH connectivity
        run: |
          # Retry up to 3 times — the auth handshake itself can fail
          # transiently even after keyscan succeeded (sshd race on busy days).
          for attempt in 1 2 3; do
            if ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=20 \
                -o ServerAliveInterval=15 \
                "root@${{ secrets.VPS_HOST }}" \
                'whoami; hostname -f; uptime'; then
              exit 0
            fi
            echo "ssh handshake attempt ${attempt} failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ ssh handshake failed 3× — check VPS_SSH_KEY secret and authorized_keys on the VPS"
          exit 1

      - name: Pre-flight disk check on VPS
        # Cheap canary: if the VPS is already wedged on disk, fail fast here
        # instead of after a 25-min build that errors mid-stream. Mirrors the
        # threshold inside deploy-on-vps.sh — kept in sync intentionally.
        run: |
          ssh -i ~/.ssh/id_ed25519 "root@${{ secrets.VPS_HOST }}" '
            pct=$(df -P / | awk "NR==2 {gsub(\"%\",\"\"); print \$5}")
            echo "VPS disk usage: ${pct}%"
            if [ "$pct" -ge 85 ]; then
              echo "::error::VPS disk ${pct}% — run vps-disk-cleanup.yml before deploying"
              exit 1
            fi
          '

      - name: Run deploy script on VPS
        # Why scp + ssh exec instead of 'ssh ... bash -s < script.sh':
        # The script does `docker compose exec -T <svc> <cmd>` several times.
        # In -T mode, docker compose forwards the parent shell's stdin to
        # the container. With 'bash -s < script.sh', the parent shell's
        # stdin IS the script content — so the FIRST exec slurps the rest
        # of the script into the container's stdin (where it's discarded).
        # bash then reads EOF and exits silently, skipping every step after
        # the first exec. We saw exactly this: deploy stopped right after
        # the nginx reload exec, never reached migrations. Hid I022 for
        # 6 weeks. Run the script as a real file instead.
        timeout-minutes: 30
        run: |
          scp -i ~/.ssh/id_ed25519 infra/scripts/deploy-on-vps.sh "root@${{ secrets.VPS_HOST }}:/tmp/deploy-on-vps.sh"
          ssh -i ~/.ssh/id_ed25519 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 "root@${{ secrets.VPS_HOST }}" 'bash /tmp/deploy-on-vps.sh && rm -f /tmp/deploy-on-vps.sh'

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_ed25519
