# Dependabot — automated dependency updates + security PRs.
#
# Why grouped: an ungrouped Dependabot opens 30+ PRs per Monday and
# drowns the queue. Grouping minor/patch into one PR per ecosystem
# keeps review cost flat. Major bumps stay separate (they need a human
# decision — breaking changes hit Prisma migrations, Next router, etc.).
#
# Security updates are NEVER grouped (open immediately, separately) —
# Dependabot does this automatically regardless of `groups`.
#
# Major version freezes (2026-04-27):
#   18 major-bump PRs were closed and frozen in I032 (governance/OPEN_ISSUES.md).
#   Re-enable each ignore rule when the corresponding migration session is ready.

version: 2

updates:
  # ── Root workspace (pnpm catalog + tooling) ──
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security:auto
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    # Major version freezes — re-enable by removing the ignore rule when ready.
    # Security PRs are still created even for ignored versions (Dependabot override).
    ignore:
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]   # v4 needs full CSS rewrite (I032)
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]   # v7 = Remix merge, breaking API (I032)
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]   # v3 breaking chart API (I032)
      - dependency-name: "@nestjs/swagger"
        update-types: ["version-update:semver-major"]   # 8→11 three major versions (I032)
    commit-message:
      prefix: chore(deps)
      include: scope

  # ── apps/api (NestJS + Prisma — financial core) ──
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security:auto
      - area:api
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]   # v6 needs ecosystem stabilisation (I032)
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]   # v7 needs full ORM migration (I032)
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]   # paired with prisma (I032)
      - dependency-name: "@nestjs/bull"
        update-types: ["version-update:semver-major"]   # v11 queue API changes (I032)
      - dependency-name: "@nestjs/config"
        update-types: ["version-update:semver-major"]   # v4 ConfigModule changes (I032)
    commit-message:
      prefix: chore(api/deps)
      include: scope

  # ── apps/web (Next.js admin panel) ──
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security:auto
      - area:web
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]   # (I032)
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]   # (I032)
      - dependency-name: "tailwind-merge"
        update-types: ["version-update:semver-major"]   # v3 requires Tailwind 4 (I032)
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]   # v1 renamed many icons (I032)
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]   # v25 type changes (I032)
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]   # (I032)
    commit-message:
      prefix: chore(web/deps)
      include: scope

  # ── apps/pos (Tauri offline POS) ──
  - package-ecosystem: npm
    directory: /apps/pos
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security:auto
      - area:pos
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]   # (I032)
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]   # (I032)
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]   # (I032)
    commit-message:
      prefix: chore(pos/deps)
      include: scope

  # ── apps/desktop (Tauri admin) ──
  - package-ecosystem: npm
    directory: /apps/desktop
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security:auto
      - area:desktop
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: chore(desktop/deps)
      include: scope

  # ── apps/storefront (Next.js e-commerce) ──
  - package-ecosystem: npm
    directory: /apps/storefront
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security:auto
      - area:storefront
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]   # (I032)
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]   # (I032)
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]   # v4 breaking validation API (I032)
    commit-message:
      prefix: chore(storefront/deps)
      include: scope

  # ── Docker base images (api, nginx, postgres, redis, etc.) ──
  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security:auto
      - area:infra
    commit-message:
      prefix: chore(infra/docker)

  # ── GitHub Actions versions (uses: actions/checkout@v4 etc.) ──
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - security:auto
      - area:ci
    groups:
      actions-minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: chore(ci/deps)
