# ─────────────────────────────────────────────────────────────────────────────
# Al-Ruya ERP Storefront — Host-level nginx vhost for shop.ibherp.cloud
#
# This file is NOT served from the docker container. Install it on the VPS
# host's nginx (typically /etc/nginx/sites-available/shop.ibherp.cloud)
# and symlink to sites-enabled. Runs the SSL termination and proxies to
# the in-container nginx on 127.0.0.1:8080 (same target as ibherp.cloud).
#
# Setup steps (run on VPS as root, after DNS A record points to this VPS):
#   sudo cp /opt/al-ruya-erp/infra/nginx/host-vhost-shop.conf \
#           /etc/nginx/sites-available/shop.ibherp.cloud
#   sudo ln -s /etc/nginx/sites-available/shop.ibherp.cloud \
#              /etc/nginx/sites-enabled/shop.ibherp.cloud
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d shop.ibherp.cloud --non-interactive \
#                --agree-tos -m admin@ibherp.cloud --redirect
#   # certbot rewrites this file in place to add the SSL block.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name shop.ibherp.cloud;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → docker nginx (which then proxies to storefront:3002)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # WebSocket / Next.js HMR (rare in prod, but harmless)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

# certbot --nginx will append a 443 server block here on first run.
# Re-running `certbot renew` keeps the SSL cert fresh.
