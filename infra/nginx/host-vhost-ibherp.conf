# ─────────────────────────────────────────────────────────────────────────────
# Al-Ruya ERP — host-level nginx vhost for ibherp.cloud
# Replaces the old /etc/nginx/sites-available/erp (Node.js + PM2 → port 5000)
# with a proxy to the new Dockerized stack on 127.0.0.1:8080.
#
# Cert: reuses the existing /etc/letsencrypt/live/ibherp.cloud-0001/
# Place at:    /etc/nginx/sites-available/erp
# Activate:    ln -sf /etc/nginx/sites-available/erp /etc/nginx/sites-enabled/erp
#              nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

upstream erp_new_stack {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ibherp.cloud www.ibherp.cloud;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS — proxy everything to Docker stack on 127.0.0.1:8080
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ibherp.cloud www.ibherp.cloud;

    ssl_certificate     /etc/letsencrypt/live/ibherp.cloud-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ibherp.cloud-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/ibherp.cloud-0001/chain.pem;
    resolver            1.1.1.1 8.8.8.8 valid=300s;

    server_tokens off;
    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block bad bots
    if ($http_user_agent ~* (nmap|nikto|sqlmap|masscan|zgrab|semrush|ahrefsbot|mj12bot|dotbot|blexbot|petalbot)) {
        return 444;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # Forward EVERYTHING to the Docker stack's internal nginx,
    # which routes /api/* → api:3000 and /* → web:3001
    location / {
        proxy_pass         http://erp_new_stack;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout    90s;
        proxy_read_timeout    90s;
        proxy_next_upstream error timeout http_502 http_503;
    }

    access_log /var/log/nginx/ibherp.access.log;
    error_log  /var/log/nginx/ibherp.error.log;
}
