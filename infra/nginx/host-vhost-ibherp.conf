# ─────────────────────────────────────────────────────────────────────────────
# Al-Ruya ERP — host-level Nginx vhost for ibherp.cloud
# Place this file at: /etc/nginx/sites-available/ibherp.cloud
# Enable with:        ln -s /etc/nginx/sites-available/ibherp.cloud /etc/nginx/sites-enabled/
# Test:               nginx -t
# Reload:             systemctl reload nginx
#
# Pre-requisites:
#   1. The Docker stack is running and listening on 127.0.0.1:8080
#      (set by docker-compose.bootstrap.yml — ports: '127.0.0.1:8080:80')
#   2. DNS A record:  ibherp.cloud → <VPS_IP>
#   3. Let's Encrypt cert obtained:
#      certbot certonly --nginx -d ibherp.cloud -d www.ibherp.cloud
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ibherp.cloud www.ibherp.cloud;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy everything to Docker stack on 127.0.0.1:8080
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ibherp.cloud www.ibherp.cloud;

    ssl_certificate     /etc/letsencrypt/live/ibherp.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ibherp.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    # Forward EVERYTHING to the Docker stack
    # The stack's internal nginx handles routing /api/* vs / (web)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_connect_timeout 10s;
    }

    access_log /var/log/nginx/ibherp.access.log;
    error_log  /var/log/nginx/ibherp.error.log;
}
