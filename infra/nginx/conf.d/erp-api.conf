# ─────────────────────────────────────────────────────────────────────────────
# Al-Ruya ERP — Nginx configuration
# Domains:
#   api.al-ruya.iq    → NestJS API (port 3000)
#   app.al-ruya.iq    → Next.js Admin Web (port 3001)
#   store.al-ruya.iq  → Next.js Storefront (port 3002)
#   minio.al-ruya.iq  → MinIO Console (port 9001)
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect all HTTP → HTTPS ───────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Rate limiting zones ─────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_global:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;

# ── NestJS API ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.al-ruya.iq;

    ssl_certificate     /etc/letsencrypt/live/api.al-ruya.iq/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.al-ruya.iq/privkey.pem;

    include /etc/nginx/ssl/ssl-params.conf;

    # Security headers
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # Gzip
    gzip on;
    gzip_types application/json;
    gzip_min_length 1024;

    # Auth endpoints — stricter rate limit
    location /auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # File uploads — larger body
    location /api/v1/import/ {
        client_max_body_size 50M;
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSocket (for real-time notifications)
    location /ws/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # All other API routes
    location / {
        limit_req zone=api_global burst=20 nodelay;
        client_max_body_size 10M;
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Timeout for long-running report generation
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ── Next.js Admin ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.al-ruya.iq;

    ssl_certificate     /etc/letsencrypt/live/app.al-ruya.iq/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.al-ruya.iq/privkey.pem;

    include /etc/nginx/ssl/ssl-params.conf;

    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location /_next/static/ {
        proxy_pass http://web:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass         http://web:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Storefront ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name store.al-ruya.iq;

    ssl_certificate     /etc/letsencrypt/live/store.al-ruya.iq/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/store.al-ruya.iq/privkey.pem;

    include /etc/nginx/ssl/ssl-params.conf;

    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location /_next/static/ {
        proxy_pass http://storefront:3002;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass         http://storefront:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── MinIO Console ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name minio.al-ruya.iq;

    ssl_certificate     /etc/letsencrypt/live/minio.al-ruya.iq/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minio.al-ruya.iq/privkey.pem;

    include /etc/nginx/ssl/ssl-params.conf;

    # Restrict to internal IPs only (change to your office/VPN IP)
    # allow 185.x.x.x;
    # deny all;

    location / {
        proxy_pass         http://minio:9001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }
}
