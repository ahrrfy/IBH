# ─────────────────────────────────────────────────────────────────────────────
# Al-Ruya ERP — Bootstrap Nginx (scoped to ibherp.cloud ONLY)
#
# This config is SAFE to run alongside other domains on the same VPS:
#   - It binds to server_name ibherp.cloud + www.ibherp.cloud explicitly
#   - It does NOT use server_name _ (catch-all)
#   - Other domains (e.g. sirajalquran.org) handled by a separate nginx
#     instance OR a host-level reverse proxy in front of Docker.
#
# IMPORTANT: This nginx runs INSIDE Docker on a non-standard port.
# Host-level nginx (or Caddy) on :80/:443 is responsible for terminating SSL
# and proxying ibherp.cloud traffic to this container.
#
# Routes (relative to ibherp.cloud):
#   /api/*    → NestJS API (apps/api on :3000)
#   /health   → API health
#   /_next/*  → Next.js static
#   /         → Next.js Web Admin (apps/web on :3001)
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=erp_global:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=erp_auth:10m rate=10r/m;

# Default server: REJECT anything that's not ibherp.cloud
# Prevents this nginx from accidentally serving other domains on shared VPS.
server {
    listen 80 default_server;
    server_name _;
    return 444;   # close connection without response
}

server {
    listen 80;
    server_name ibherp.cloud www.ibherp.cloud;

    client_max_body_size 50M;

    # Docker embedded DNS — re-resolve service names so we don't cache stale
    # container IPs after `docker compose up -d --force-recreate`. Closes I013.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    set $upstream_api api;
    set $upstream_web web;
    set $upstream_whatsapp whatsapp-bridge;

    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types application/json text/css application/javascript;
    gzip_min_length 1024;

    # Let's Encrypt ACME (when SSL is added at host-level, this won't be hit)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API auth — stricter rate limit. NestJS uses globalPrefix='api',
    # so we forward the path as-is (no rewrite).
    location /api/auth/ {
        limit_req zone=erp_auth burst=5 nodelay;
        proxy_pass         http://$upstream_api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API — forward path as-is (NestJS expects /api/...)
    location /api/ {
        limit_req zone=erp_global burst=20 nodelay;
        proxy_pass         http://$upstream_api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Public health endpoint (also at /api/v1/health for clients)
    location = /health {
        proxy_pass http://$upstream_api:3000/api/v1/health;
        access_log off;
    }

    # WhatsApp Cloud API webhook bridge — Meta calls
    # https://ibherp.cloud/whatsapp/webhook (GET verify + POST messages).
    # Strip the /whatsapp prefix so the bridge sees /webhook + /send + /health.
    location /whatsapp/ {
        rewrite ^/whatsapp(/.*)$ $1 break;
        proxy_pass         http://$upstream_whatsapp:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /_next/static/ {
        proxy_pass http://$upstream_web:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass         http://$upstream_web:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
