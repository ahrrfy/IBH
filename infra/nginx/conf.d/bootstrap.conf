# ─────────────────────────────────────────────────────────────────────────────
# Al-Ruya ERP — Bootstrap Nginx config (HTTP-only, IP-based)
# Use this for the FIRST deploy before you have a domain + SSL.
# After domain is pointed and Let's Encrypt cert is issued, switch to erp-api.conf
#
# Routes:
#   /api/  → NestJS API (apps/api on :3000)
#   /      → Next.js Web Admin (apps/web on :3001)
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=api_global:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50M;

    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types application/json text/css application/javascript;
    gzip_min_length 1024;

    # Let's Encrypt ACME challenge (used later when we add SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth endpoints — stricter rate limit, strip /api prefix
    location /api/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API — strip /api prefix when forwarding to NestJS
    location /api/ {
        limit_req zone=api_global burst=20 nodelay;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Direct API health check
    location = /health {
        proxy_pass http://api:3000/health;
        access_log off;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://web:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Web Admin (Next.js) — everything else
    location / {
        proxy_pass         http://web:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
