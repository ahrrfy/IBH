version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Al-Ruya ERP — VPS Bootstrap Stack (HTTP-only, IP-based)
# Hostinger KVM4 · Ubuntu 24.04 · 187.124.183.140
# Usage:
#   1. Copy .env.production.example → .env on VPS, fill in passwords
#   2. docker compose -f infra/docker-compose.bootstrap.yml up -d
#   3. Open http://<VPS_IP>/ → web admin
#      curl http://<VPS_IP>/health → API health
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: '10m'
    max-file: '3'

x-restart: &restart-policy
  restart: unless-stopped

networks:
  erp-internal:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:

  # ── 1. PostgreSQL 16 + pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    <<: *restart-policy
    logging: *default-logging
    environment:
      POSTGRES_DB: alruya_erp
      POSTGRES_USER: erp_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - erp-internal
    command:
      - 'postgres'
      - '-c'
      - 'max_connections=200'
      - '-c'
      - 'shared_buffers=512MB'
      - '-c'
      - 'effective_cache_size=2GB'
      - '-c'
      - 'work_mem=8MB'
      - '-c'
      - 'log_min_duration_statement=1000'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp_app -d alruya_erp']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 2. Redis 7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *restart-policy
    logging: *default-logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required in .env}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - erp-internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── 3. MinIO ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    <<: *restart-policy
    logging: *default-logging
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY required in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY required in .env}
    volumes:
      - minio-data:/data
    networks:
      - erp-internal
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - erp-internal
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
      mc mb --ignore-existing local/erp-documents;
      mc mb --ignore-existing local/erp-attachments;
      mc mb --ignore-existing local/erp-exports;
      mc anonymous set download local/erp-exports;
      echo 'MinIO buckets ready';
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

  # ── 4. NestJS API ────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: production
    image: al-ruya/erp-api:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://erp_app:${POSTGRES_PASSWORD}@postgres:5432/alruya_erp?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_DOCUMENTS: erp-documents
      MINIO_BUCKET_ATTACHMENTS: erp-attachments
      MINIO_BUCKET_EXPORTS: erp-exports
      APP_URL: ${APP_URL:-http://187.124.183.140}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://187.124.183.140}
      # System owner credentials — only consumed by seed, never logged
      OWNER_USERNAME: ${OWNER_USERNAME:-}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      # No defaults — admin user only created if both vars are set in .env
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # I047 — kill-switch for heavy background-job modules. With Wave 6 +
      # 50 autopilot jobs registered, AppModule bootstrap exceeded the
      # /health probe budget on production deploys. Set to '1' to skip
      # these modules until @nestjs/bull's BullExplorer is fixed (I048).
      BACKGROUND_JOBS_DISABLED: ${BACKGROUND_JOBS_DISABLED:-1}
    networks:
      - erp-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Compose healthcheck OVERRIDES the Dockerfile HEALTHCHECK — keep these
    # in sync. Path: /api/v1/health (URI versioning). 127.0.0.1 explicit because
    # Alpine resolves 'localhost' to ::1 first but Nest binds IPv4 only.
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q -t 1 http://127.0.0.1:3000/api/v1/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── 5. Next.js Web Admin ─────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: production
    image: al-ruya/erp-web:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3000
      NEXT_PUBLIC_API_URL: ${APP_URL:-http://187.124.183.140}/api
    networks:
      - erp-internal
    depends_on:
      - api

  # ── 5b. Storefront (public e-commerce, shop.ibherp.cloud) ────────────────
  # Read-only product catalog + checkout. Listens on :3002 inside the
  # docker network. Host nginx + bootstrap nginx proxy shop.* here.
  storefront:
    build:
      context: ..
      dockerfile: apps/storefront/Dockerfile
      target: production
    image: al-ruya/erp-storefront:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3000
      NEXT_PUBLIC_API_URL: ${SHOP_URL:-https://shop.ibherp.cloud}/api
    networks:
      - erp-internal
    depends_on:
      - api

  # ── 6. Nginx (binds to 127.0.0.1:8080 — host nginx fronts it) ────────────
  # Why 127.0.0.1:8080 and not 0.0.0.0:80?
  # The VPS already runs a host-level nginx for sirajalquran.org. We avoid
  # the conflict by binding internally; host nginx proxies ibherp.cloud here.
  # ── 7. AI Brain (Python FastAPI — anomaly + forecast + NL query) ──────
  # Tier 2 ML: PyOD anomaly + Prophet forecasting (always running, ~1-2GB).
  # Tier 1 (Qwen 7B) loaded on demand via Ollama profile.
  # Wave 6 / F5. Listens on :8001 inside docker network.
  ai-brain:
    build:
      context: ../apps/ai-brain
      dockerfile: Dockerfile
    image: al-ruya/ai-brain:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      AI_BRAIN_API_KEY: ${AI_BRAIN_API_KEY:-}
    networks:
      - erp-internal
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8001/health'').read()" || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 8. License Server (RSA-2048 signed licenses, heartbeat, grace) ──────
  # Standalone Fastify service, listens on :8003 inside the docker network.
  # Wave 6 / D12 — required for production licensing.
  license-server:
    build:
      context: ../apps/license-server
      dockerfile: Dockerfile
    image: al-ruya/license-server:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 8003
      LICENSE_ADMIN_TOKEN: ${LICENSE_ADMIN_TOKEN:?LICENSE_ADMIN_TOKEN required in .env}
    networks:
      - erp-internal
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q -t 1 http://127.0.0.1:8003/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── 9. WhatsApp Bridge (Fastify webhook + outbound /send) ───────────────
  # Receives Meta webhooks (orders/support) and proxies outbound messages
  # from the ERP. Listens on :8002 inside the docker network. Exposed
  # publicly via host nginx at /webhook/whatsapp (see vhost conf).
  #
  # ⚠️  OPTIONAL — only starts with the "whatsapp" compose profile.
  # Normal deploys skip this service until Meta credentials are in VPS .env.
  # To enable: docker compose --profile whatsapp up -d whatsapp-bridge
  whatsapp-bridge:
    profiles: [whatsapp]
    build:
      context: ../apps/whatsapp-bridge
      dockerfile: Dockerfile
    image: al-ruya/whatsapp-bridge:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 8002
      # Meta-side credentials — set in /opt/al-ruya-erp/infra/.env (chmod 600).
      # Using :- (not :?) because docker-compose interpolates all vars at parse
      # time, even for profile-gated services — empty defaults prevent startup
      # failure when WA is not yet configured. The bridge itself validates these
      # at boot and exits loudly if they are empty.
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_ID:     ${WHATSAPP_PHONE_ID:-}
      # Internal handoff to the ERP API (uses docker-network DNS)
      ERP_API_URL:           ${ERP_API_URL:-http://api:3000}
      ERP_API_TOKEN:         ${ERP_API_TOKEN:-}
    networks:
      - erp-internal
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q -t 1 http://127.0.0.1:8002/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # See infra/nginx/host-vhost-ibherp.conf for the host-side vhost.
  nginx:
    image: nginx:1.27-alpine
    <<: *restart-policy
    logging: *default-logging
    ports:
      - '127.0.0.1:${ERP_NGINX_PORT:-8080}:80'
    volumes:
      - ./nginx/conf.d/bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - erp-internal
    depends_on:
      - api
      - web
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3
