version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Al-Ruya ERP — VPS Bootstrap Stack (HTTP-only, IP-based)
# Hostinger KVM4 · Ubuntu 24.04 · 187.124.183.140
# Usage:
#   1. Copy .env.production.example → .env on VPS, fill in passwords
#   2. docker compose -f infra/docker-compose.bootstrap.yml up -d
#   3. Open http://<VPS_IP>/ → web admin
#      curl http://<VPS_IP>/health → API health
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: '10m'
    max-file: '3'

x-restart: &restart-policy
  restart: unless-stopped

networks:
  erp-internal:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:

  # ── 1. PostgreSQL 16 + pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    <<: *restart-policy
    logging: *default-logging
    environment:
      POSTGRES_DB: alruya_erp
      POSTGRES_USER: erp_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - erp-internal
    command:
      - 'postgres'
      - '-c'
      - 'max_connections=200'
      - '-c'
      - 'shared_buffers=512MB'
      - '-c'
      - 'effective_cache_size=2GB'
      - '-c'
      - 'work_mem=8MB'
      - '-c'
      - 'log_min_duration_statement=1000'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp_app -d alruya_erp']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 2. Redis 7 ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *restart-policy
    logging: *default-logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required in .env}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - erp-internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── 3. MinIO ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    <<: *restart-policy
    logging: *default-logging
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY required in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY required in .env}
    volumes:
      - minio-data:/data
    networks:
      - erp-internal
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - erp-internal
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
      mc mb --ignore-existing local/erp-documents;
      mc mb --ignore-existing local/erp-attachments;
      mc mb --ignore-existing local/erp-exports;
      mc anonymous set download local/erp-exports;
      echo 'MinIO buckets ready';
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

  # ── 4. NestJS API ────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: production
    image: al-ruya/erp-api:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://erp_app:${POSTGRES_PASSWORD}@postgres:5432/alruya_erp?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_DOCUMENTS: erp-documents
      MINIO_BUCKET_ATTACHMENTS: erp-attachments
      MINIO_BUCKET_EXPORTS: erp-exports
      APP_URL: ${APP_URL:-http://187.124.183.140}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://187.124.183.140}
      # System owner credentials — only consumed by seed, never logged
      OWNER_USERNAME: ${OWNER_USERNAME:-}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@al-ruya.iq}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    networks:
      - erp-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── 5. Next.js Web Admin ─────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: production
    image: al-ruya/erp-web:latest
    <<: *restart-policy
    logging: *default-logging
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3000
      NEXT_PUBLIC_API_URL: ${APP_URL:-http://187.124.183.140}/api
    networks:
      - erp-internal
    depends_on:
      - api

  # ── 6. Nginx (binds to 127.0.0.1:8080 — host nginx fronts it) ────────────
  # Why 127.0.0.1:8080 and not 0.0.0.0:80?
  # The VPS already runs a host-level nginx for sirajalquran.org. We avoid
  # the conflict by binding internally; host nginx proxies ibherp.cloud here.
  # See infra/nginx/host-vhost-ibherp.conf for the host-side vhost.
  nginx:
    image: nginx:1.27-alpine
    <<: *restart-policy
    logging: *default-logging
    ports:
      - '127.0.0.1:${ERP_NGINX_PORT:-8080}:80'
    volumes:
      - ./nginx/conf.d/bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - erp-internal
    depends_on:
      - api
      - web
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3
